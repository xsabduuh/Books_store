<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة المفضلة - مكتبة النور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
 /* ========== LIGHT MODE (default) ========== */
:root {
  --bg-body: #FAF7F2;
  --text-primary: #1C2B33;
  --text-secondary: #6B7F89;
  --border-light: #EDE5D8;
  --card-bg: #FFFFFF;
  --accent: #C9935A;
  --accent-dark: #A87040;
  --accent-light: #F5E8D6;
  --danger: #D94F4F;
  --heart: #e84393;
  --shadow: rgba(0, 0, 0, 0.05);
  --icon-bg: rgba(201,147,90,0.12);
  --icon-hover: rgba(201,147,90,0.25);
  --toast-bg: #1C2B33;
  --toast-text: #FFFFFF;
  --overlay: rgba(28,43,51,0.55);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg-body);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.35s, color 0.25s;
}

/* Top accent bar */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #8b3a1a, var(--accent), var(--heart), var(--accent), #8b3a1a);
  z-index: 100;
}

/* Soft bg glow (light mode) */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 15% 15%, rgba(232,67,147,0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 85% 85%, rgba(201,145,58,0.07) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.page-wrapper {
  position: relative;
  z-index: 1;
  max-width: 980px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* Header */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 32px;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
}
.back-btn:hover { color: var(--accent-dark); transform: translateX(3px); }

.logo {
  font-family: 'Amiri', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 1rem;
  box-shadow: 0 4px 12px rgba(201,147,90,0.35);
  transition: transform 0.3s, box-shadow 0.3s;
}
.logo:hover .logo-icon {
  transform: rotate(-5deg) scale(1.08);
  box-shadow: 0 6px 16px rgba(201,147,90,0.45);
}

.cart-link {
  color: var(--accent);
  font-size: 1.3rem;
  text-decoration: none;
  transition: all 0.2s;
  position: relative;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: var(--icon-bg);
}
.cart-link:hover {
  color: var(--accent-dark);
  background: var(--icon-hover);
  transform: scale(1.05);
}
.cart-badge {
  position: absolute;
  top: -4px;
  left: -4px;
  min-width: 18px;
  height: 18px;
  background: var(--accent-dark);
  color: #fff;
  font-size: 0.6rem;
  font-weight: 700;
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

/* Page Title */
.page-title-block {
  text-align: center;
  margin-bottom: 36px;
  animation: fadeDown 0.5s ease both;
}
.page-title-block h1 {
  font-family: 'Amiri', serif;
  font-size: 2rem;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 4px;
}
.title-heart {
  color: var(--heart);
  font-size: 1.4rem;
  animation: heartbeat 2s ease-in-out infinite;
}
.page-title-block .subtitle {
  color: var(--text-secondary);
  font-size: 0.85rem;
}
.ornament {
  display: block;
  color: var(--heart);
  font-size: 1.1rem;
  letter-spacing: 8px;
  margin: 6px 0;
  opacity: 0.5;
}

/* Stats Bar */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 12px 20px;
  margin-bottom: 24px;
  box-shadow: 0 2px 12px var(--shadow);
  animation: fadeUp 0.4s ease both;
}
.stat-item {
  text-align: center;
  flex: 1;
}
.stat-num {
  font-family: 'Amiri', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  display: block;
}
.stat-label {
  font-size: 0.72rem;
  color: var(--text-secondary);
}
.stat-divider {
  width: 1px;
  height: 32px;
  background: var(--border-light);
  flex-shrink: 0;
}
.add-all-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  white-space: nowrap;
}
.add-all-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(201,147,90,0.3);
}

/* Controls Bar */
.controls-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  animation: fadeUp 0.45s ease both;
}
.sort-select {
  flex: 1;
  padding: 9px 14px;
  border: 1px solid var(--border-light);
  border-radius: 10px;
  background: var(--card-bg);
  font-family: 'Cairo', sans-serif;
  font-size: 0.85rem;
  color: var(--text-primary);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
.sort-select:focus { border-color: var(--accent); }

.view-toggle {
  display: flex;
  gap: 4px;
  background: var(--accent-light);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 4px;
}
.view-btn {
  width: 34px; height: 34px;
  border: none;
  background: transparent;
  border-radius: 7px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 0.9rem;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.view-btn.active {
  background: var(--card-bg);
  color: var(--accent);
  box-shadow: 0 1px 6px var(--shadow);
}
.view-btn:hover:not(.active) {
  background: var(--icon-bg);
  color: var(--accent);
}

/* Cards Grid */
.wishlist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.wish-card {
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 14px var(--shadow);
  transition: all 0.25s ease;
  animation: fadeUp 0.4s ease both;
  position: relative;
  display: flex;
  flex-direction: column;
}
.wish-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
}

.heart-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  width: 34px;
  height: 34px;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--heart);
  font-size: 1rem;
  border: 1px solid rgba(232, 67, 147, 0.3);
  backdrop-filter: blur(2px);
  z-index: 2;
  transition: all 0.2s;
}
.wish-card:hover .heart-badge {
  transform: scale(1.05);
  background: white;
}

.book-cover {
  height: 160px;
  background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent-light) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.book-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.wish-card:hover .book-cover img {
  transform: scale(1.05);
}
.book-cover .fallback-icon {
  font-size: 3rem;
  color: var(--accent-dark);
  opacity: 0.6;
}

.card-body {
  padding: 12px 14px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.card-title {
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--text-primary);
  margin-bottom: 4px;
  line-height: 1.4;
}
.card-author {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.card-price {
  font-family: 'Amiri', serif;
  font-weight: 700;
  color: var(--accent-dark);
  font-size: 1rem;
  margin-bottom: 2px;
}
.card-note {
  font-size: 0.7rem;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

.card-footer {
  display: flex;
  gap: 8px;
  margin-top: auto;
}
.btn-cart {
  flex: 1;
  padding: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.btn-cart:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(201,147,90,0.3);
}
.btn-remove {
  width: 34px; height: 34px;
  background: var(--accent-light);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  cursor: pointer;
  color: var(--danger);
  font-size: 0.8rem;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-remove:hover {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
  transform: scale(0.96);
}

/* List View */
.wishlist-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.wish-row {
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 10px var(--shadow);
  transition: all 0.2s;
  animation: slideIn 0.35s ease both;
}
.wish-row:hover {
  transform: translateX(-4px);
  box-shadow: 0 6px 18px var(--shadow);
}
.row-thumb {
  width: 56px;
  height: 74px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: var(--accent-light);
}
.row-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.row-thumb .fallback-icon {
  font-size: 1.8rem;
  color: var(--accent-dark);
  opacity: 0.5;
}
.row-info { flex: 1; min-width: 0; }
.row-title {
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--text-primary);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.row-author { font-size: 0.76rem; color: var(--text-secondary); margin-bottom: 5px; }
.row-price-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-light);
  color: var(--accent-dark);
  font-weight: 700;
  font-size: 0.82rem;
  padding: 3px 10px;
  border-radius: 6px;
  border: 1px solid rgba(201,145,58,0.25);
}
.row-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.row-cart-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.row-cart-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(201,147,90,0.3);
}
.row-remove-btn {
  width: 36px; height: 36px;
  background: var(--accent-light);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  cursor: pointer;
  color: var(--danger);
  font-size: 0.82rem;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.row-remove-btn:hover {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 64px 20px;
  animation: fadeUp 0.5s ease both;
}
.empty-hearts {
  font-size: 3rem;
  margin-bottom: 20px;
  animation: heartbeat 2s ease-in-out infinite;
  display: block;
}
.empty-state h2 {
  font-family: 'Amiri', serif;
  font-size: 1.5rem;
  margin-bottom: 8px;
}
.empty-state p {
  color: var(--text-secondary);
  font-size: 0.88rem;
  margin-bottom: 28px;
}
.btn-browse {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--heart), #c0165a);
  color: #fff;
  padding: 12px 28px;
  border-radius: 10px;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  text-decoration: none;
  transition: all 0.25s;
  box-shadow: 0 4px 16px rgba(232,67,147,0.3);
}
.btn-browse:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(232,67,147,0.4);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--toast-bg);
  color: var(--toast-text);
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 0.85rem;
  font-weight: 600;
  z-index: 300;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast i { color: var(--accent); }

/* Animations */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  30%      { transform: scale(1.18); }
  60%      { transform: scale(1.08); }
}

/* Responsive */
@media (max-width: 480px) {
  .wishlist-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .row-cart-btn span { display: none; }
  .stats-bar { flex-wrap: wrap; gap: 8px; }
}

 /* ========== DARK MODE (matches index.html) ========== */

[data-theme="dark"] .cart-link:hover {

  // --- Book Image Mapping (match home page images) ---
  const bookImages = {

    'متعة أن تكون في العشرين': 'IMG_2515.JPG',
    'الأنثى كما يجب أن تكون': 'IMG_2516.JPG',
    'أحببت وغداً': 'IMG_2517.JPG'
  };
  // Default fallback image (a placeholder or empty)
  const DEFAULT_IMAGE_FALLBACK = null; // will use fallback icon if null

  function getBookImageUrl(bookName) {
    const imgFile = bookImages[bookName];
    if (imgFile) return imgFile;
    return null;
  }

  // --- Wishlist State ---
  let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let currentView = 'grid';

  // Normalize wishlist items
  wishlist = wishlist.map(function(item) {
    if (typeof item === 'string') {
      return { name: item, author: '', price: 85 };
    }
    return { name: item.name || item, author: item.author || '', price: item.price || 85 };
  });

  function updateCartBadge() {
    const badge = document.getElementById('cartBadge');
    const count = cart.reduce((s, i) => s + (i.qty || 1), 0);
    if (count > 0) {
      badge.style.display = 'flex';
      badge.textContent = count;
    } else {
      badge.style.display = 'none';
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // Helper to render book cover image or fallback
  function renderCoverImage(bookName, altText, className = '') {
    const imgUrl = getBookImageUrl(bookName);
    if (imgUrl) {
      return `<img src="${imgUrl}" alt="${altText}" class="${className}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'fallback-icon\\'><i class=\\'fas fa-book\\'></i></div>';">`;
    } else {
      return `<div class="fallback-icon"><i class="fas fa-book"></i></div>`;
    }
  }

  // Render
  function render() {
    const container = document.getElementById('mainContent');
    updateCartBadge();

    if (wishlist.length === 0) {
      container.innerHTML = `

          <a href="index.html" class="btn-browse"><i class="fas fa-compass"></i> اكتشف الكتب</a>
        </div>`;
      return;
    }

    const totalVal = wishlist.reduce((s, i) => s + i.price, 0);
    const statsHTML = `
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-num">${wishlist.length}</span>
          <span class="stat-label">كتب مفضلة</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">${totalVal}</span>
          <span class="stat-label">درهم (القيمة)</span>
        </div>
        <div class="stat-divider"></div>
        <button class="add-all-btn" onclick="addAllToCart()">
          <i class="fas fa-cart-plus"></i> أضف الكل للسلة
        </button>
      </div>`;

    const controlsHTML = `
      <div class="controls-bar">
        <select class="sort-select" onchange="handleSort(this.value)">
          <option value="default">الترتيب: الافتراضي</option>
          <option value="name">الترتيب: الاسم</option>
          <option value="price-asc">السعر: الأقل أولاً</option>
          <option value="price-desc">السعر: الأعلى أولاً</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn ${currentView === 'grid' ? 'active' : ''}" onclick="setView('grid')">
            <i class="fas fa-th"></i>
          </button>
          <button class="view-btn ${currentView === 'list' ? 'active' : ''}" onclick="setView('list')">
            <i class="fas fa-list"></i>
          </button>
        </div>
      </div>`;

    let itemsHTML = '';
    if (currentView === 'grid') {
      itemsHTML = '<div class="wishlist-grid">';
      wishlist.forEach((item, i) => {
        const delay = (i * 0.06).toFixed(2);
        const coverHtml = renderCoverImage(item.name, item.name, 'book-cover-img');
        itemsHTML += `
          <div class="wish-card" style="animation-delay:${delay}s">
            <div class="heart-badge"><i class="fas fa-heart"></i></div>
            <div class="book-cover">
              ${coverHtml}
            </div>
            <div class="card-body">
              <div class="card-title">${escapeHtml(item.name)}</div>
              ${item.author ? `<div class="card-author">${escapeHtml(item.author)}</div>` : ''}
              <div class="card-price">${item.price} <small style="font-size:0.65rem;color:var(--text-muted)">درهم</small></div>
              <div class="card-note">+ 15 درهم شحن</div>
              <div class="card-footer">
                <button class="btn-cart" onclick="addToCart(${i})">
                  <i class="fas fa-cart-plus"></i> أضف للسلة
                </button>
                <button class="btn-remove" onclick="removeItem(${i})">
                  <i class="fas fa-heart-broken"></i>
                </button>
              </div>
            </div>
          </div>`;
      });
      itemsHTML += '</div>';
    } else {
      itemsHTML = '<div class="wishlist-list">';
      wishlist.forEach((item, i) => {
        const delay = (i * 0.06).toFixed(2);
        const thumbHtml = renderCoverImage(item.name, item.name, 'row-thumb-img');
        itemsHTML += `
          <div class="wish-row" style="animation-delay:${delay}s">
            <div class="row-thumb">
              ${thumbHtml}
            </div>
            <div class="row-info">
              <div class="row-title">${escapeHtml(item.name)}</div>
              ${item.author ? `<div class="row-author">${escapeHtml(item.author)}</div>` : ''}
              <span class="row-price-tag"><i class="fas fa-tag" style="font-size:0.65rem"></i> ${item.price} درهم</span>
            </div>
            <div class="row-actions">
              <button class="row-cart-btn" onclick="addToCart(${i})">
                <i class="fas fa-cart-plus"></i>
                <span>أضف للسلة</span>
              </button>
              <button class="row-remove-btn" onclick="removeItem(${i})">
                <i class="fas fa-heart-broken"></i>
              </button>
            </div>
          </div>`;
      });
      itemsHTML += '</div>';
    }

    container.innerHTML = statsHTML + controlsHTML + itemsHTML;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Actions
  window.addToCart = function(index) {
    const item = wishlist[index];
    let existing = null;
    for (let j = 0; j < cart.length; j++) {
      if (cart[j].name === item.name) { existing = cart[j]; break; }
    }
    if (existing) {
      existing.qty = (existing.qty || 1) + 1;
    } else {
      cart.push({ name: item.name, author: item.author, price: item.price, qty: 1 });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    showToast('تمت الإضافة إلى السلة 🛒');
  };

  window.addAllToCart = function() {
    wishlist.forEach(item => {
      let existing = null;
      for (let j = 0; j < cart.length; j++) {
        if (cart[j].name === item.name) { existing = cart[j]; break; }
      }
      if (existing) {
        existing.qty = (existing.qty || 1) + 1;
      } else {
        cart.push({ name: item.name, author: item.author, price: item.price, qty: 1 });
      }
    });
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    showToast('تمت إضافة جميع الكتب للسلة 🛒');
  };

  window.removeItem = function(index) {
    wishlist.splice(index, 1);
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
    render();
    showToast('تمت الإزالة من المفضلة 💔');
  };

  window.setView = function(v) {
    currentView = v;
    render();
  };

  window.handleSort = function(val) {
    if (val === 'name') {
      wishlist.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
    } else if (val === 'price-asc') {
      wishlist.sort((a, b) => a.price - b.price);
    } else if (val === 'price-desc') {
      wishlist.sort((a, b) => b.price - a.price);
    }
    render();
  };

  render();
</script>
</body>
</html>
