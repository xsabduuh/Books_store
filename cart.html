<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', 'Tajawal', sans-serif; background: #f5f3f0; color: #1e2a2e; max-width: 800px; margin: 0 auto; padding: 20px; }
        a { color: #b8915c; text-decoration: none; }
        .back-link { margin-bottom: 20px; display: block; }
        .cart-item { padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>سلة التسوق</h1>
    <div id="cartItems"></div>
    <p id="totalPrice"></p>
    <button onclick="checkout()">إتمام الشراء</button>
    <script>
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cartItems');
        const totalEl = document.getElementById('totalPrice');
        if (cart.length === 0) {
            container.innerHTML = '<p>السلة فارغة</p>';
        } else {
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `<div class="cart-item">${item.name} - ${item.price} درهم <button onclick="removeFromCart(${index})">إزالة</button></div>`;
            });
            totalEl.textContent = `المجموع: ${total} درهم`;
        }
        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            location.reload();
        }
        function checkout() {
            alert('تم إتمام الطلب (محاكاة)');
        }
    </script>
</body>
</html>
