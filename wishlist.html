<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الرغبات - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f3f0; --text: #1e2a2e; --card: white; --border: #e0dcd5; --accent: #b8915c; --danger: #c0392b;
        }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #d4a373; --danger: #e06b6b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Tajawal', sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        a { color: var(--accent); text-decoration: none; }
        .back-link { margin-bottom: 30px; display: block; }
        h1 { color: var(--accent); }
        .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 20px; }
        .wishlist-item { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .item-img { width: 60px; height: 80px; background: #ccc; border-radius: 8px; }
        .item-info { flex: 1; }
        .item-title { font-weight: 600; }
        .item-price { color: var(--accent); }
        .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; }
        .empty-msg { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>قائمة الرغبات</h1>
    <div id="wishlistContainer" class="wishlist-grid"></div>
    <div id="emptyMsg" class="empty-msg" style="display:none;">قائمة الرغبات فارغة. ابدأ بإضافة كتبك المفضلة!</div>

    <script>
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const container = document.getElementById('wishlistContainer');
        const emptyMsg = document.getElementById('emptyMsg');

        function renderWishlist() {
            if (wishlist.length === 0) {
                container.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }
            container.style.display = 'grid';
            emptyMsg.style.display = 'none';
            container.innerHTML = wishlist.map((item, index) => `
                <div class="wishlist-item">
                    <div class="item-img"></div>
                    <div class="item-info">
                        <div class="item-title">${item}</div>
                        <div class="item-price">85 درهم</div>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function removeItem(index) {
            wishlist.splice(index, 1);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            renderWishlist();
        }

        renderWishlist();
    </script>
</body>
</html>
