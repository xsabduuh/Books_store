<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة المفضلة - مكتبة النور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  /* ========== LIGHT MODE (default) ========== */
  :root {
    --ink: #1a1209;
    --parchment: #faf6ee;
    --sand: #f0e8d4;
    --gold: #c9913a;
    --gold-light: #e8b96a;
    --gold-pale: #f5e6c8;
    --sienna: #8b3a1a;
    --rose: #c0392b;
    --rose-pale: #fff0ee;
    --heart: #e84393;
    --text-muted: #7a6a55;
    --border: #ddd0b8;
    --shadow: rgba(26, 18, 9, 0.10);
    --card-bg: #ffffff;
    --body-bg: var(--parchment);
    --header-border: var(--border);
    --stat-bg: #ffffff;
    --btn-hover-shadow: rgba(201, 145, 58, 0.3);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--body-bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background-color 0.3s ease, color 0.2s ease;
  }

  /* Top accent bar */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--sienna), var(--gold), #e84393, var(--gold), var(--sienna));
    z-index: 100;
  }

  /* Soft bg glow */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(232, 67, 147, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(201, 145, 58, 0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  /* Header */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--header-border);
    margin-bottom: 32px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--gold);
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--sienna); transform: translateX(3px); }

  .logo {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--gold), var(--sienna));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1rem;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .logo-icon:hover {
    transform: scale(1.02);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
  }

  .cart-link {
    color: var(--gold);
    font-size: 1.3rem;
    text-decoration: none;
    transition: all 0.2s;
    position: relative;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(201, 145, 58, 0.1);
  }
  .cart-link:hover {
    color: var(--sienna);
    background: rgba(139, 58, 26, 0.1);
    transform: scale(1.05);
  }
  .cart-badge {
    position: absolute;
    top: -4px;
    left: -4px;
    min-width: 18px;
    height: 18px;
    background: var(--sienna);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  /* Page Title */
  .page-title-block {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.5s ease both;
  }
  .page-title-block h1 {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .title-heart {
    color: var(--heart);
    font-size: 1.4rem;
    animation: heartbeat 2s ease-in-out infinite;
  }
  .page-title-block .subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .ornament {
    display: block;
    color: var(--heart);
    font-size: 1.1rem;
    letter-spacing: 8px;
    margin: 6px 0;
    opacity: 0.5;
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--stat-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px var(--shadow);
    animation: fadeUp 0.4s ease both;
  }
  .stat-item {
    text-align: center;
    flex: 1;
  }
  .stat-num {
    font-family: 'Amiri', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    display: block;
  }
  .stat-label {
    font-size: 0.72rem;
    color: var(--text-muted);
  }
  .stat-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
    flex-shrink: 0;
  }
  .add-all-btn {
    background: linear-gradient(135deg, var(--gold), var(--sienna));
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-all-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 14px var(--btn-hover-shadow);
  }

  /* Controls Bar */
  .controls-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    animation: fadeUp 0.45s ease both;
  }
  .sort-select {
    flex: 1;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--stat-bg);
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .sort-select:focus { border-color: var(--gold); }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--sand);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .view-btn {
    width: 34px; height: 34px;
    border: none;
    background: transparent;
    border-radius: 7px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.9rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .view-btn.active {
    background: var(--card-bg);
    color: var(--gold);
    box-shadow: 0 1px 6px var(--shadow);
  }
  .view-btn:hover:not(.active) {
    background: rgba(201, 145, 58, 0.1);
    color: var(--gold);
  }

  /* Cards Grid */
  .wishlist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .wish-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 14px var(--shadow);
    transition: all 0.25s ease;
    animation: fadeUp 0.4s ease both;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .wish-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(26, 18, 9, 0.2);
  }

  /* Heart badge frame */
  .heart-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    width: 34px;
    height: 34px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--heart);
    font-size: 1rem;
    border: 1px solid rgba(232, 67, 147, 0.3);
    backdrop-filter: blur(2px);
    z-index: 2;
    transition: all 0.2s;
  }
  .wish-card:hover .heart-badge {
    transform: scale(1.05);
    background: white;
  }

  /* Book cover with real image */
  .book-cover {
    height: 160px;
    background: linear-gradient(135deg, var(--sand) 0%, var(--gold-pale) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .book-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }
  .wish-card:hover .book-cover img {
    transform: scale(1.05);
  }
  /* Fallback if image missing */
  .book-cover .fallback-icon {
    font-size: 3rem;
    color: var(--sienna);
    opacity: 0.6;
  }

  .card-body {
    padding: 12px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .card-title {
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .card-author {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .card-price {
    font-family: 'Amiri', serif;
    font-weight: 700;
    color: var(--sienna);
    font-size: 1rem;
    margin-bottom: 2px;
  }
  .card-note {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .card-footer {
    display: flex;
    gap: 8px;
    margin-top: auto;
  }
  .btn-cart {
    flex: 1;
    padding: 8px;
    background: linear-gradient(135deg, var(--gold), var(--sienna));
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .btn-cart:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--btn-hover-shadow);
  }
  .btn-remove {
    width: 34px; height: 34px;
    background: var(--rose-pale);
    border: 1px solid #f5c0b8;
    border-radius: 8px;
    cursor: pointer;
    color: var(--rose);
    font-size: 0.8rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-remove:hover {
    background: var(--rose);
    color: #fff;
    border-color: var(--rose);
    transform: scale(0.96);
  }

  /* List View */
  .wishlist-list { display: flex; flex-direction: column; gap: 12px; }

  .wish-row {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 10px var(--shadow);
    transition: all 0.2s;
    animation: slideIn 0.35s ease both;
  }
  .wish-row:hover {
    transform: translateX(-4px);
    box-shadow: 0 6px 18px var(--shadow);
  }

  .row-thumb {
    width: 56px;
    height: 74px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    background: var(--gold-pale);
  }
  .row-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .row-thumb .fallback-icon {
    font-size: 1.8rem;
    color: var(--sienna);
    opacity: 0.5;
  }

  .row-info { flex: 1; min-width: 0; }
  .row-title {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--ink);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-author { font-size: 0.76rem; color: var(--text-muted); margin-bottom: 5px; }
  .row-price-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--gold-pale);
    color: var(--sienna);
    font-weight: 700;
    font-size: 0.82rem;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid rgba(201, 145, 58, 0.25);
  }

  .row-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .row-cart-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: linear-gradient(135deg, var(--gold), var(--sienna));
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .row-cart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--btn-hover-shadow);
  }
  .row-remove-btn {
    width: 36px; height: 36px;
    background: var(--rose-pale);
    border: 1px solid #f5c0b8;
    border-radius: 8px;
    cursor: pointer;
    color: var(--rose);
    font-size: 0.82rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .row-remove-btn:hover {
    background: var(--rose);
    color: #fff;
    border-color: var(--rose);
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 64px 20px;
    animation: fadeUp 0.5s ease both;
  }
  .empty-hearts {
    font-size: 3rem;
    margin-bottom: 20px;
    animation: heartbeat 2s ease-in-out infinite;
    display: block;
  }
  .empty-state h2 {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  .empty-state p {
    color: var(--text-muted);
    font-size: 0.88rem;
    margin-bottom: 28px;
  }
  .btn-browse {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--heart), #c0165a);
    color: #fff;
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    text-decoration: none;
    transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(232, 67, 147, 0.3);
  }
  .btn-browse:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232, 67, 147, 0.4);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 300;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast i { color: var(--gold-light); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    30%      { transform: scale(1.18); }
    60%      { transform: scale(1.08); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .wishlist-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .row-cart-btn span { display: none; }
    .stats-bar { flex-wrap: wrap; gap: 8px; }
  }

  /* ========== DARK MODE OVERRIDES ========== */
  body.dark-mode {
    --ink: #efe6db;
    --parchment: #1e1a15;
    --sand: #2a241e;
    --gold: #dba450;
    --gold-light: #f0c674;
    --gold-pale: #4a3a28;
    --sienna: #c67c4a;
    --rose: #e6695a;
    --rose-pale: #3a2824;
    --heart: #ff77aa;
    --text-muted: #b8aa92;
    --border: #4a3e32;
    --shadow: rgba(0, 0, 0, 0.4);
    --card-bg: #2c251f;
    --body-bg: var(--parchment);
    --header-border: var(--border);
    --stat-bg: #2c251f;
    --btn-hover-shadow: rgba(219, 164, 80, 0.4);
  }

  body.dark-mode .logo-icon {
    background: linear-gradient(135deg, var(--gold), #a45d2a);
  }
  body.dark-mode .cart-link {
    background: rgba(219, 164, 80, 0.15);
  }
  body.dark-mode .cart-link:hover {
    background: rgba(198, 124, 74, 0.2);
  }
  body.dark-mode .heart-badge {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    color: #ff99bb;
    border-color: rgba(255, 119, 170, 0.5);
  }
  body.dark-mode .btn-cart,
  body.dark-mode .row-cart-btn,
  body.dark-mode .add-all-btn {
    background: linear-gradient(135deg, var(--gold), #b45a2a);
  }
  body.dark-mode .btn-remove,
  body.dark-mode .row-remove-btn {
    background: rgba(230, 105, 90, 0.2);
    border-color: rgba(230, 105, 90, 0.4);
  }
  body.dark-mode .btn-remove:hover,
  body.dark-mode .row-remove-btn:hover {
    background: var(--rose);
    border-color: var(--rose);
  }
  body.dark-mode .view-toggle {
    background: #2c251f;
  }
  body.dark-mode .view-btn.active {
    background: #3f352b;
    color: var(--gold);
  }
  body.dark-mode .row-price-tag {
    background: #3f352b;
    border-color: rgba(219, 164, 80, 0.3);
  }
  body.dark-mode .stats-bar,
  body.dark-mode .sort-select {
    background: #2c251f;
  }
  /* Dark mode fallback icon color */
  body.dark-mode .book-cover .fallback-icon,
  body.dark-mode .row-thumb .fallback-icon {
    color: var(--gold);
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <header class="site-header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-right"></i> الرئيسية
    </a>
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-book-open"></i></div>
      مكتبة النور
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <!-- Dark mode toggle button -->
      <button id="darkModeToggle" style="background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--gold); transition: all 0.2s; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <i class="fas fa-moon"></i>
      </button>
      <a href="cart.html" class="cart-link">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cartBadge" style="display:none"></span>
      </a>
    </div>
  </header>

  <div class="page-title-block">
    <h1>
      <i class="fas fa-heart title-heart"></i>
      قائمة المفضلة
      <i class="fas fa-heart title-heart"></i>
    </h1>
    <span class="ornament">♥ · · ♥</span>
    <p class="subtitle">كتبك المحفوظة في انتظارك</p>
  </div>

  <div id="mainContent"></div>

</div>

<div class="toast" id="toast">
  <i class="fas fa-check-circle"></i>
  <span id="toastText"></span>
</div>

<script data-cfasync="false">
  // --- Dark Mode Handling ---
  const toggleBtn = document.getElementById('darkModeToggle');
  const body = document.body;
  const icon = toggleBtn.querySelector('i');
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    body.classList.add('dark-mode');
    icon.classList.remove('fa-moon');
    icon.classList.add('fa-sun');
  } else {
    icon.classList.remove('fa-sun');
    icon.classList.add('fa-moon');
  }
  toggleBtn.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    const isDark = body.classList.contains('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    if (isDark) {
      icon.classList.remove('fa-moon');
      icon.classList.add('fa-sun');
    } else {
      icon.classList.remove('fa-sun');
      icon.classList.add('fa-moon');
    }
  });

  // --- Book Image Mapping (match home page images) ---
  const bookImages = {
    'فن اللامبالاة': 'IMG_2514.JPG',
    'متعة أن تكون في العشرين': 'IMG_2515.JPG',
    'الأنثى كما يجب أن تكون': 'IMG_2516.JPG',
    'أحببت وغداً': 'IMG_2517.JPG'
  };
  // Default fallback image (a placeholder or empty)
  const DEFAULT_IMAGE_FALLBACK = null; // will use fallback icon if null

  function getBookImageUrl(bookName) {
    const imgFile = bookImages[bookName];
    if (imgFile) return imgFile;
    return null;
  }

  // --- Wishlist State ---
  let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let currentView = 'grid';

  // Normalize wishlist items
  wishlist = wishlist.map(function(item) {
    if (typeof item === 'string') {
      return { name: item, author: '', price: 85 };
    }
    return { name: item.name || item, author: item.author || '', price: item.price || 85 };
  });

  function updateCartBadge() {
    const badge = document.getElementById('cartBadge');
    const count = cart.reduce((s, i) => s + (i.qty || 1), 0);
    if (count > 0) {
      badge.style.display = 'flex';
      badge.textContent = count;
    } else {
      badge.style.display = 'none';
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastText').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // Helper to render book cover image or fallback
  function renderCoverImage(bookName, altText, className = '') {
    const imgUrl = getBookImageUrl(bookName);
    if (imgUrl) {
      return `<img src="${imgUrl}" alt="${altText}" class="${className}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'fallback-icon\\'><i class=\\'fas fa-book\\'></i></div>';">`;
    } else {
      return `<div class="fallback-icon"><i class="fas fa-book"></i></div>`;
    }
  }

  // Render
  function render() {
    const container = document.getElementById('mainContent');
    updateCartBadge();

    if (wishlist.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="empty-hearts">🤍</span>
          <h2>المفضلة فارغة</h2>
          <p>لم تضف أي كتاب بعد.<br>اكتشف مجموعتنا وأضف ما يلفت انتباهك!</p>
          <a href="index.html" class="btn-browse"><i class="fas fa-compass"></i> اكتشف الكتب</a>
        </div>`;
      return;
    }

    const totalVal = wishlist.reduce((s, i) => s + i.price, 0);
    const statsHTML = `
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-num">${wishlist.length}</span>
          <span class="stat-label">كتب مفضلة</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">${totalVal}</span>
          <span class="stat-label">درهم (القيمة)</span>
        </div>
        <div class="stat-divider"></div>
        <button class="add-all-btn" onclick="addAllToCart()">
          <i class="fas fa-cart-plus"></i> أضف الكل للسلة
        </button>
      </div>`;

    const controlsHTML = `
      <div class="controls-bar">
        <select class="sort-select" onchange="handleSort(this.value)">
          <option value="default">الترتيب: الافتراضي</option>
          <option value="name">الترتيب: الاسم</option>
          <option value="price-asc">السعر: الأقل أولاً</option>
          <option value="price-desc">السعر: الأعلى أولاً</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn ${currentView === 'grid' ? 'active' : ''}" onclick="setView('grid')">
            <i class="fas fa-th"></i>
          </button>
          <button class="view-btn ${currentView === 'list' ? 'active' : ''}" onclick="setView('list')">
            <i class="fas fa-list"></i>
          </button>
        </div>
      </div>`;

    let itemsHTML = '';
    if (currentView === 'grid') {
      itemsHTML = '<div class="wishlist-grid">';
      wishlist.forEach((item, i) => {
        const delay = (i * 0.06).toFixed(2);
        const coverHtml = renderCoverImage(item.name, item.name, 'book-cover-img');
        itemsHTML += `
          <div class="wish-card" style="animation-delay:${delay}s">
            <div class="heart-badge"><i class="fas fa-heart"></i></div>
            <div class="book-cover">
              ${coverHtml}
            </div>
            <div class="card-body">
              <div class="card-title">${escapeHtml(item.name)}</div>
              ${item.author ? `<div class="card-author">${escapeHtml(item.author)}</div>` : ''}
              <div class="card-price">${item.price} <small style="font-size:0.65rem;color:var(--text-muted)">درهم</small></div>
              <div class="card-note">+ 15 درهم شحن</div>
              <div class="card-footer">
                <button class="btn-cart" onclick="addToCart(${i})">
                  <i class="fas fa-cart-plus"></i> أضف للسلة
                </button>
                <button class="btn-remove" onclick="removeItem(${i})">
                  <i class="fas fa-heart-broken"></i>
                </button>
              </div>
            </div>
          </div>`;
      });
      itemsHTML += '</div>';
    } else {
      itemsHTML = '<div class="wishlist-list">';
      wishlist.forEach((item, i) => {
        const delay = (i * 0.06).toFixed(2);
        const thumbHtml = renderCoverImage(item.name, item.name, 'row-thumb-img');
        itemsHTML += `
          <div class="wish-row" style="animation-delay:${delay}s">
            <div class="row-thumb">
              ${thumbHtml}
            </div>
            <div class="row-info">
              <div class="row-title">${escapeHtml(item.name)}</div>
              ${item.author ? `<div class="row-author">${escapeHtml(item.author)}</div>` : ''}
              <span class="row-price-tag"><i class="fas fa-tag" style="font-size:0.65rem"></i> ${item.price} درهم</span>
            </div>
            <div class="row-actions">
              <button class="row-cart-btn" onclick="addToCart(${i})">
                <i class="fas fa-cart-plus"></i>
                <span>أضف للسلة</span>
              </button>
              <button class="row-remove-btn" onclick="removeItem(${i})">
                <i class="fas fa-heart-broken"></i>
              </button>
            </div>
          </div>`;
      });
      itemsHTML += '</div>';
    }

    container.innerHTML = statsHTML + controlsHTML + itemsHTML;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Actions
  window.addToCart = function(index) {
    const item = wishlist[index];
    let existing = null;
    for (let j = 0; j < cart.length; j++) {
      if (cart[j].name === item.name) { existing = cart[j]; break; }
    }
    if (existing) {
      existing.qty = (existing.qty || 1) + 1;
    } else {
      cart.push({ name: item.name, author: item.author, price: item.price, qty: 1 });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    showToast('تمت الإضافة إلى السلة 🛒');
  };

  window.addAllToCart = function() {
    wishlist.forEach(item => {
      let existing = null;
      for (let j = 0; j < cart.length; j++) {
        if (cart[j].name === item.name) { existing = cart[j]; break; }
      }
      if (existing) {
        existing.qty = (existing.qty || 1) + 1;
      } else {
        cart.push({ name: item.name, author: item.author, price: item.price, qty: 1 });
      }
    });
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    showToast('تمت إضافة جميع الكتب للسلة 🛒');
  };

  window.removeItem = function(index) {
    wishlist.splice(index, 1);
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
    render();
    showToast('تمت الإزالة من المفضلة 💔');
  };

  window.setView = function(v) {
    currentView = v;
    render();
  };

  window.handleSort = function(val) {
    if (val === 'name') {
      wishlist.sort((a, b) => a.name.localeCompare(b.name, 'ar'));
    } else if (val === 'price-asc') {
      wishlist.sort((a, b) => a.price - b.price);
    } else if (val === 'price-desc') {
      wishlist.sort((a, b) => b.price - a.price);
    }
    render();
  };

  render();
</script>
</body>
</html>
