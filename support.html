<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدعم الفوري - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f3f0; --text: #1e2a2e; --card: white; --border: #e0dcd5; --accent: #b8915c; --success: #25d366;
        }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #d4a373; --success: #25d366; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Tajawal', sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        a { color: var(--accent); text-decoration: none; }
        .back-link { margin-bottom: 30px; display: block; }
        h1 { color: var(--accent); }
        .support-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 20px; }
        .support-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; text-align: center; }
        .whatsapp-btn { background: var(--success); color: white; padding: 15px; border-radius: 50px; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>الدعم الفوري</h1>
    <div class="support-grid">
        <div class="support-card"><i class="fas fa-comments fa-3x" style="color:var(--accent);"></i><h3>محادثة مباشرة</h3><p>متوفرة 24/7</p><a href="#" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> واتساب</a></div>
        <div class="support-card"><i class="fas fa-phone-alt fa-3x" style="color:var(--accent);"></i><h3>اتصل بنا</h3><p>+212 600-123456</p><p>السبت - الخميس 9ص-9م</p></div>
        <div class="support-card"><i class="fas fa-ticket-alt fa-3x" style="color:var(--accent);"></i><h3>تذكرة دعم</h3><p>أرسل استفسارك وسنرد خلال 24 ساعة</p></div>
    </div>
</body>
</html>
