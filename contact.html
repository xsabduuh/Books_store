<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f3f0; --text: #1e2a2e; --card: white; --border: #e0dcd5; --accent: #b8915c;
        }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #d4a373; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Tajawal', sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        a { color: var(--accent); text-decoration: none; }
        .back-link { margin-bottom: 30px; display: block; }
        h1 { color: var(--accent); }
        .contact-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        form { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
        button { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; }
        .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; }
        .info-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .map { margin-top: 30px; height: 200px; background: #ccc; border-radius: 15px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>اتصل بنا</h1>
    <div class="contact-container">
        <form>
            <h2>أرسل رسالة</h2>
            <input type="text" placeholder="الاسم">
            <input type="email" placeholder="البريد الإلكتروني">
            <textarea rows="5" placeholder="رسالتك"></textarea>
            <button type="submit">إرسال</button>
        </form>
        <div>
            <div class="info-card">
                <h2>معلومات التواصل</h2>
                <div class="info-item"><i class="fas fa-map-marker-alt" style="color:var(--accent);"></i> الدار البيضاء، المغرب</div>
                <div class="info-item"><i class="fas fa-phone" style="color:var(--accent);"></i> +212 600-123456</div>
                <div class="info-item"><i class="fas fa-envelope" style="color:var(--accent);"></i> info@alnour.ma</div>
            </div>
            <div class="map"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d106376.716282174!2d-7.657068!3d33.57311!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xda7cd4778aa113b%3A0xb06c1d84f310fd3!2sCasablanca!5e0!3m2!1sen!2sma!4v1610000000000" width="100%" height="200" style="border:0; border-radius:15px;" allowfullscreen></iframe></div>
        </div>
    </div>
</body>
</html>
