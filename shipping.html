<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشحن والتوصيل - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f3f0;
            --text: #1e2a2e;
            --card: white;
            --border: #e0dcd5;
            --accent: #b8915c;
        }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #d4a373; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Tajawal', sans-serif;
            padding: 20px; max-width: 1200px; margin: 0 auto; transition: 0.3s;
        }
        a { color: var(--accent); text-decoration: none; }
        .back-link { margin-bottom: 30px; display: block; }
        h1 { color: var(--accent); }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        th { background: var(--accent); color: white; }
        .highlight { background: rgba(184, 145, 92, 0.1); font-weight: 600; }
        .courier-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 20px; margin-top: 30px;
        }
        .courier-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>سياسة الشحن والتوصيل</h1>
    <table>
        <tr><th>المدينة</th><th>مدة التوصيل</th><th>التكلفة</th></tr>
        <tr><td>الدار البيضاء</td><td>24 ساعة</td><td>25 درهم</td></tr>
        <tr class="highlight"><td>الرباط</td><td>24-48 ساعة</td><td>30 درهم</td></tr>
        <tr><td>مراكش</td><td>48 ساعة</td><td>35 درهم</td></tr>
        <tr><td>فاس</td><td>48-72 ساعة</td><td>40 درهم</td></tr>
        <tr><td>طنجة</td><td>48-72 ساعة</td><td>40 درهم</td></tr>
        <tr><td>المدن الأخرى</td><td>3-5 أيام</td><td>50 درهم</td></tr>
    </table>

    <h2>شركات الشحن</h2>
    <div class="courier-grid">
        <div class="courier-card"><i class="fas fa-truck fa-2x" style="color:var(--accent);"></i><h3>Amana</h3></div>
        <div class="courier-card"><i class="fas fa-box-open fa-2x" style="color:var(--accent);"></i><h3>Chronopost</h3></div>
        <div class="courier-card"><i class="fas fa-ship fa-2x" style="color:var(--accent);"></i><h3>DHL</h3></div>
    </div>
</body>
</html>
