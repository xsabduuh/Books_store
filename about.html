<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عن المكتبة - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f3f0;
            --text: #1e2a2e;
            --card: white;
            --border: #e0dcd5;
            --accent: #b8915c;
        }
        [data-theme="dark"] {
            --bg: #121212;
            --text: #e0e0e0;
            --card: #1e1e1e;
            --border: #333;
            --accent: #d4a373;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
            transition: 0.3s;
            max-width: 1200px;
            margin: 0 auto;
        }
        a { color: var(--accent); text-decoration: none; }
        .back-link { margin-bottom: 30px; display: block; }
        h1 { font-size: 2.5rem; color: var(--accent); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .stat-number { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        .team-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .team-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
    </style>
</head>
<body data-theme="light">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>عن مكتبة النور</h1>
    <p>منصة رائدة في عالم الكتب العربية، تأسست عام 2020 بهدف نشر المعرفة وجعل الكتاب في متناول الجميع.</p>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number">15k+</div><div>عنوان كتاب</div></div>
        <div class="stat-card"><div class="stat-number">50k+</div><div>عميل</div></div>
        <div class="stat-card"><div class="stat-number">10+</div><div>دول</div></div>
        <div class="stat-card"><div class="stat-number">4.8</div><div>تقييم</div></div>
    </div>

    <h2>فريقنا</h2>
    <div class="team-grid">
        <div class="team-card"><img src="https://via.placeholder.com/120" alt=""><h3>أحمد النوري</h3><p>المؤسس والمدير</p></div>
        <div class="team-card"><img src="https://via.placeholder.com/120" alt=""><h3>سارة السعدي</h3><p>مديرة التحرير</p></div>
        <div class="team-card"><img src="https://via.placeholder.com/120" alt=""><h3>خالد البدر</h3><p>مسؤول الشحن</p></div>
    </div>
</body>
</html>
