<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الرغبات - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', 'Tajawal', sans-serif; background: #f5f3f0; color: #1e2a2e; max-width: 800px; margin: 0 auto; padding: 20px; }
        a { color: #b8915c; text-decoration: none; }
        .back-link { margin-bottom: 20px; display: block; }
        .wishlist-item { padding: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>قائمة الرغبات</h1>
    <div id="wishlistItems"></div>
    <script>
        const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const container = document.getElementById('wishlistItems');
        if (wishlist.length === 0) {
            container.innerHTML = '<p>قائمة الرغبات فارغة</p>';
        } else {
            wishlist.forEach(item => {
                container.innerHTML += `<div class="wishlist-item">${item}</div>`;
            });
        }
    </script>
</body>
</html>
