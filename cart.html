<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سلة التسوق - مكتبة النور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root {
    --ink: #1a1209;
    --parchment: #faf6ee;
    --sand: #f0e8d4;
    --gold: #c9913a;
    --gold-light: #e8b96a;
    --gold-pale: #f5e6c8;
    --sienna: #8b3a1a;
    --text-muted: #7a6a55;
    --border: #ddd0b8;
    --shadow: rgba(26,18,9,0.12);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Cairo’, sans-serif;
background: var(–parchment);
color: var(–ink);
min-height: 100vh;
position: relative;
overflow-x: hidden;
}

/* Background texture */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
radial-gradient(ellipse at 20% 10%, rgba(201,145,58,0.07) 0%, transparent 50%),
radial-gradient(ellipse at 80% 90%, rgba(139,58,26,0.05) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

/* Decorative lines */
body::after {
content: ‘’;
position: fixed;
top: 0; left: 0; right: 0;
height: 4px;
background: linear-gradient(90deg, var(–sienna), var(–gold), var(–gold-light), var(–gold), var(–sienna));
z-index: 100;
}

.page-wrapper {
position: relative;
z-index: 1;
max-width: 860px;
margin: 0 auto;
padding: 0 16px 60px;
}

/* ── Header ── */
.site-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 20px 0 16px;
border-bottom: 1px solid var(–border);
margin-bottom: 32px;
}

.back-btn {
display: flex;
align-items: center;
gap: 8px;
color: var(–gold);
font-size: 0.9rem;
font-weight: 600;
text-decoration: none;
transition: all 0.2s;
}
.back-btn:hover { color: var(–sienna); transform: translateX(3px); }

.logo {
font-family: ‘Amiri’, serif;
font-size: 1.6rem;
font-weight: 700;
color: var(–ink);
display: flex;
align-items: center;
gap: 8px;
}
.logo-icon {
width: 36px; height: 36px;
background: linear-gradient(135deg, var(–gold), var(–sienna));
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
color: #fff; font-size: 1rem;
}

/* ── Page Title ── */
.page-title-block {
text-align: center;
margin-bottom: 36px;
animation: fadeDown 0.5s ease both;
}
.page-title-block h1 {
font-family: ‘Amiri’, serif;
font-size: 2rem;
color: var(–ink);
margin-bottom: 4px;
}
.page-title-block .subtitle {
color: var(–text-muted);
font-size: 0.85rem;
}
.ornament {
display: block;
color: var(–gold);
font-size: 1.4rem;
letter-spacing: 6px;
margin: 6px 0;
opacity: 0.7;
}

/* ── EMPTY STATE ── */
.empty-cart {
text-align: center;
padding: 64px 20px;
animation: fadeUp 0.5s ease both;
}
.empty-icon {
width: 100px; height: 100px;
background: var(–sand);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
margin: 0 auto 24px;
font-size: 2.4rem;
color: var(–gold);
border: 2px dashed var(–border);
}
.empty-cart h2 {
font-family: ‘Amiri’, serif;
font-size: 1.4rem;
color: var(–ink);
margin-bottom: 8px;
}
.empty-cart p {
color: var(–text-muted);
font-size: 0.9rem;
margin-bottom: 28px;
}
.btn-browse {
display: inline-flex;
align-items: center;
gap: 8px;
background: linear-gradient(135deg, var(–gold), var(–sienna));
color: #fff;
padding: 12px 28px;
border-radius: 10px;
font-family: ‘Cairo’, sans-serif;
font-weight: 700;
font-size: 0.95rem;
text-decoration: none;
transition: all 0.25s;
box-shadow: 0 4px 16px rgba(201,145,58,0.3);
}
.btn-browse:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,145,58,0.4); }

/* ── LAYOUT ── */
.cart-layout {
display: grid;
grid-template-columns: 1fr;
gap: 20px;
}

/* ── Cart Items Card ── */
.cart-card {
background: #fff;
border: 1px solid var(–border);
border-radius: 16px;
overflow: hidden;
box-shadow: 0 2px 20px var(–shadow);
animation: fadeUp 0.4s ease both;
}
.card-header {
padding: 16px 20px;
background: linear-gradient(135deg, var(–sand), var(–gold-pale));
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
}
.card-header-title {
font-family: ‘Amiri’, serif;
font-size: 1.15rem;
color: var(–ink);
display: flex;
align-items: center;
gap: 8px;
}
.card-header-title i { color: var(–gold); }
.items-count {
background: var(–gold);
color: #fff;
font-size: 0.75rem;
font-weight: 700;
padding: 3px 10px;
border-radius: 20px;
}

/* ── Cart Item Row ── */
.cart-item {
padding: 16px 20px;
border-bottom: 1px solid var(–sand);
display: flex;
align-items: center;
gap: 14px;
transition: background 0.2s;
animation: slideIn 0.3s ease both;
}
.cart-item:last-child { border-bottom: none; }
.cart-item:hover { background: #fffbf5; }

.book-thumb {
width: 52px; height: 70px;
background: linear-gradient(135deg, var(–sand), var(–gold-pale));
border-radius: 6px;
display: flex; align-items: center; justify-content: center;
font-size: 1.4rem;
flex-shrink: 0;
border: 1px solid var(–border);
position: relative;
overflow: hidden;
}
.book-thumb::after {
content: ‘’;
position: absolute;
right: 0; top: 0; bottom: 0;
width: 4px;
background: linear-gradient(180deg, var(–gold), var(–sienna));
opacity: 0.6;
}

.item-info { flex: 1; min-width: 0; }
.item-name {
font-weight: 700;
font-size: 0.95rem;
color: var(–ink);
margin-bottom: 4px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.item-author {
font-size: 0.78rem;
color: var(–text-muted);
margin-bottom: 6px;
}
.item-price-tag {
display: inline-flex;
align-items: center;
gap: 4px;
background: var(–gold-pale);
color: var(–sienna);
font-weight: 700;
font-size: 0.85rem;
padding: 3px 10px;
border-radius: 6px;
border: 1px solid rgba(201,145,58,0.3);
}

.item-actions {
display: flex;
align-items: center;
gap: 10px;
flex-shrink: 0;
}
.qty-control {
display: flex;
align-items: center;
gap: 0;
background: var(–sand);
border-radius: 8px;
overflow: hidden;
border: 1px solid var(–border);
}
.qty-btn {
width: 30px; height: 30px;
background: transparent;
border: none;
cursor: pointer;
color: var(–gold);
font-size: 0.9rem;
transition: background 0.15s;
display: flex; align-items: center; justify-content: center;
}
.qty-btn:hover { background: var(–gold-pale); }
.qty-num {
width: 28px;
text-align: center;
font-weight: 700;
font-size: 0.9rem;
color: var(–ink);
background: transparent;
border: none;
outline: none;
}
.remove-btn {
width: 32px; height: 32px;
border: 1px solid #f0dada;
background: #fff8f8;
border-radius: 8px;
cursor: pointer;
color: #c0392b;
font-size: 0.8rem;
transition: all 0.2s;
display: flex; align-items: center; justify-content: center;
}
.remove-btn:hover { background: #c0392b; color: #fff; border-color: #c0392b; }

/* ── Summary Card ── */
.summary-card {
background: #fff;
border: 1px solid var(–border);
border-radius: 16px;
overflow: hidden;
box-shadow: 0 2px 20px var(–shadow);
animation: fadeUp 0.5s ease 0.1s both;
}
.summary-card .card-header { background: linear-gradient(135deg, var(–ink), #2d1f0f); }
.summary-card .card-header-title { color: #fff; }
.summary-body { padding: 20px; }

.summary-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 0;
font-size: 0.9rem;
color: var(–text-muted);
border-bottom: 1px dashed var(–border);
}
.summary-row:last-of-type { border-bottom: none; }
.summary-row span:last-child { font-weight: 600; color: var(–ink); }

.summary-divider {
height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
margin: 12px 0;
}

.summary-total {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 0 4px;
}
.total-label {
font-family: ‘Amiri’, serif;
font-size: 1.1rem;
color: var(–ink);
}
.total-amount {
font-family: ‘Amiri’, serif;
font-size: 1.6rem;
font-weight: 700;
color: var(–sienna);
}
.total-currency { font-size: 0.9rem; color: var(–text-muted); margin-right: 4px; }

/* ── Promo Code ── */
.promo-section {
margin-top: 16px;
display: flex;
gap: 8px;
}
.promo-input {
flex: 1;
padding: 10px 14px;
border: 1px solid var(–border);
border-radius: 10px;
font-family: ‘Cairo’, sans-serif;
font-size: 0.85rem;
background: var(–parchment);
color: var(–ink);
outline: none;
transition: border-color 0.2s;
direction: ltr;
text-align: center;
}
.promo-input:focus { border-color: var(–gold); }
.promo-input::placeholder { color: var(–text-muted); direction: rtl; }
.promo-btn {
padding: 10px 16px;
background: var(–sand);
border: 1px solid var(–border);
border-radius: 10px;
cursor: pointer;
font-family: ‘Cairo’, sans-serif;
font-weight: 600;
font-size: 0.82rem;
color: var(–ink);
transition: all 0.2s;
white-space: nowrap;
}
.promo-btn:hover { background: var(–gold-pale); border-color: var(–gold); }

/* ── Checkout Button ── */
.checkout-btn {
width: 100%;
margin-top: 18px;
padding: 16px;
background: linear-gradient(135deg, var(–gold) 0%, var(–sienna) 100%);
color: #fff;
border: none;
border-radius: 12px;
font-family: ‘Cairo’, sans-serif;
font-weight: 700;
font-size: 1rem;
cursor: pointer;
transition: all 0.25s;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
box-shadow: 0 4px 18px rgba(201,145,58,0.35);
letter-spacing: 0.5px;
}
.checkout-btn:hover {
transform: translateY(-2px);
box-shadow: 0 8px 24px rgba(201,145,58,0.45);
}
.checkout-btn:active { transform: translateY(0); }

/* ── Secure Badge ── */
.secure-badge {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
margin-top: 12px;
font-size: 0.75rem;
color: var(–text-muted);
}
.secure-badge i { color: #2ecc71; }

/* ── Continue Shopping ── */
.continue-link {
display: block;
text-align: center;
margin-top: 20px;
color: var(–gold);
font-size: 0.85rem;
font-weight: 600;
text-decoration: none;
transition: color 0.2s;
}
.continue-link:hover { color: var(–sienna); }

/* ── Checkout Modal ── */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(26,18,9,0.6);
z-index: 200;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
padding: 16px;
}
.modal-overlay.active { display: flex; }
.modal-box {
background: #fff;
border-radius: 20px;
padding: 36px 28px;
max-width: 360px;
width: 100%;
text-align: center;
animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
border: 1px solid var(–border);
}
.modal-icon {
width: 80px; height: 80px;
background: linear-gradient(135deg, #e8f8ee, #d4f0de);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
margin: 0 auto 20px;
font-size: 2rem;
color: #27ae60;
border: 3px solid #b8e8c8;
}
.modal-box h2 {
font-family: ‘Amiri’, serif;
font-size: 1.4rem;
margin-bottom: 8px;
}
.modal-box p { color: var(–text-muted); font-size: 0.88rem; margin-bottom: 24px; }
.modal-close {
background: linear-gradient(135deg, var(–gold), var(–sienna));
color: #fff;
border: none;
padding: 12px 32px;
border-radius: 10px;
font-family: ‘Cairo’, sans-serif;
font-weight: 700;
font-size: 0.95rem;
cursor: pointer;
transition: all 0.2s;
}
.modal-close:hover { transform: translateY(-2px); }

/* Animations */
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-16px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
from { opacity: 0; transform: translateX(16px); }
to   { opacity: 1; transform: translateX(0); }
}
@keyframes popIn {
from { opacity: 0; transform: scale(0.85); }
to   { opacity: 1; transform: scale(1); }
}
</style>

</head>
<body>

<div class="page-wrapper">

  <!-- Header -->

  <header class="site-header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-right"></i> الرئيسية
    </a>
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-book-open"></i></div>
      مكتبة النور
    </div>
    <a href="wishlist.html" style="color:var(--gold);font-size:1.3rem;" title="المفضلة">
      <i class="fas fa-heart"></i>
    </a>
  </header>

  <!-- Title -->

  <div class="page-title-block">
    <h1>سلة التسوق</h1>
    <span class="ornament">— ✦ —</span>
    <p class="subtitle">راجع طلبك قبل إتمام الشراء</p>
  </div>

  <!-- Content -->

  <div id="cartContent"></div>

</div>

<!-- Checkout Modal -->

<div class="modal-overlay" id="checkoutModal">
  <div class="modal-box">
    <div class="modal-icon"><i class="fas fa-check"></i></div>
    <h2>تم استلام طلبك!</h2>
    <p>شكراً لك على الشراء من مكتبة النور.<br>سيتم التواصل معك قريباً لتأكيد الطلب.</p>
    <button class="modal-close" onclick="closeModal()">
      <i class="fas fa-home"></i> العودة للرئيسية
    </button>
  </div>
</div>

<script data-cfasync="false">
  // ─── Data ───────────────────────────────────────────────
  var cart = JSON.parse(localStorage.getItem('cart')) || [];

  // Ensure each item has qty
  cart = cart.map(function(item) {
    return { name: item.name, author: item.author || '', price: item.price, qty: item.qty || 1 };
  });

  var SHIPPING = 15;
  var DISCOUNT = 0;

  // ─── Render ──────────────────────────────────────────────
  function render() {
    var container = document.getElementById('cartContent');
    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-cart">' +
        '<div class="empty-icon"><i class="fas fa-shopping-basket"></i></div>' +
        '<h2>سلتك فارغة</h2>' +
        '<p>لم تضف أي كتب بعد.<br>استعرض مجموعتنا الرائعة واختر ما يناسبك!</p>' +
        '<a href="index.html" class="btn-browse"><i class="fas fa-book"></i> تصفح الكتب</a>' +
        '</div>';
      return;
    }

    // Build items HTML
    var itemsHTML = '';
    cart.forEach(function(item, i) {
      var delay = i * 0.06;
      itemsHTML += '<div class="cart-item" style="animation-delay:' + delay + 's">' +
        '<div class="book-thumb">📖</div>' +
        '<div class="item-info">' +
          '<div class="item-name">' + item.name + '</div>' +
          (item.author ? '<div class="item-author">' + item.author + '</div>' : '') +
          '<span class="item-price-tag"><i class="fas fa-tag" style="font-size:0.7rem"></i> ' + item.price + ' درهم</span>' +
        '</div>' +
        '<div class="item-actions">' +
          '<div class="qty-control">' +
            '<button class="qty-btn" data-cfasync="false" onclick="changeQty(' + i + ', -1)"><i class="fas fa-minus"></i></button>' +
            '<span class="qty-num">' + item.qty + '</span>' +
            '<button class="qty-btn" data-cfasync="false" onclick="changeQty(' + i + ', 1)"><i class="fas fa-plus"></i></button>' +
          '</div>' +
          '<button class="remove-btn" data-cfasync="false" onclick="removeItem(' + i + ')"><i class="fas fa-trash-alt"></i></button>' +
        '</div>' +
      '</div>';
    });

    // Subtotal
    var subtotal = cart.reduce(function(s, item) { return s + item.price * item.qty; }, 0);
    var total = subtotal + SHIPPING - DISCOUNT;
    var totalItems = cart.reduce(function(s, item) { return s + item.qty; }, 0);

    container.innerHTML =
      '<div class="cart-layout">' +

        // Items card
        '<div class="cart-card">' +
          '<div class="card-header">' +
            '<span class="card-header-title"><i class="fas fa-shopping-cart"></i> الكتب المختارة</span>' +
            '<span class="items-count">' + totalItems + ' ' + (totalItems === 1 ? 'كتاب' : 'كتب') + '</span>' +
          '</div>' +
          itemsHTML +
        '</div>' +

        // Summary card
        '<div class="summary-card">' +
          '<div class="card-header">' +
            '<span class="card-header-title"><i class="fas fa-receipt"></i> ملخص الطلب</span>' +
          '</div>' +
          '<div class="summary-body">' +
            '<div class="summary-row"><span>المجموع الفرعي</span><span>' + subtotal + ' درهم</span></div>' +
            '<div class="summary-row"><span>رسوم الشحن</span><span>' + SHIPPING + ' درهم</span></div>' +
            (DISCOUNT > 0 ? '<div class="summary-row"><span>الخصم</span><span style="color:#27ae60">- ' + DISCOUNT + ' درهم</span></div>' : '') +
            '<div class="summary-divider"></div>' +
            '<div class="summary-total">' +
              '<span class="total-label">الإجمالي</span>' +
              '<span class="total-amount"><span class="total-currency">MAD</span>' + total + '</span>' +
            '</div>' +
            '<div class="promo-section">' +
              '<input type="text" class="promo-input" id="promoCode" placeholder="كود الخصم (اختياري)">' +
              '<button class="promo-btn" data-cfasync="false" onclick="applyPromo()"><i class="fas fa-tag"></i> تطبيق</button>' +
            '</div>' +
            '<button class="checkout-btn" data-cfasync="false" onclick="checkout()">' +
              '<i class="fas fa-lock"></i> إتمام الشراء بأمان' +
            '</button>' +
            '<div class="secure-badge"><i class="fas fa-shield-alt"></i> دفع آمن ومشفر</div>' +
          '</div>' +
        '</div>' +

      '</div>' +
      '<a href="index.html" class="continue-link"><i class="fas fa-plus"></i> إضافة المزيد من الكتب</a>';
  }

  // ─── Actions ────────────────────────────────────────────
  function changeQty(index, delta) {
    cart[index].qty += delta;
    if (cart[index].qty <= 0) { removeItem(index); return; }
    save();
    render();
  }

  function removeItem(index) {
    cart.splice(index, 1);
    save();
    render();
  }

  function save() {
    localStorage.setItem('cart', JSON.stringify(cart));
  }

  function applyPromo() {
    var code = (document.getElementById('promoCode').value || '').toUpperCase().trim();
    if (code === 'ALNOOR10') {
      DISCOUNT = 10;
      alert('✅ تم تطبيق كود الخصم: خصم 10 درهم');
    } else if (code === 'WELCOME') {
      DISCOUNT = 5;
      alert('✅ تم تطبيق كود الخصم: خصم 5 درهم');
    } else {
      alert('❌ كود الخصم غير صحيح');
    }
    render();
  }

  function checkout() {
    if (cart.length === 0) return;
    document.getElementById('checkoutModal').classList.add('active');
    cart = [];
    localStorage.removeItem('cart');
  }

  function closeModal() {
    document.getElementById('checkoutModal').classList.remove('active');
    window.location.href = 'index.html';
  }

  // ─── Init ───────────────────────────────────────────────
  render();
</script>

</body>
</html>
