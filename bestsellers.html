<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأكثر مبيعاً - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f3f0; --text: #1e2a2e; --card: white; --border: #e0dcd5; --accent: #b8915c; --gold: #f4b740;
        }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #d4a373; --gold: #f4b740; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Tajawal', sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        a { color: var(--accent); text-decoration: none; }
        .back-link { margin-bottom: 30px; display: block; }
        h1 { color: var(--accent); }
        .top-three {
            display: flex; gap: 20px; justify-content: center; margin: 40px 0; flex-wrap: wrap;
        }
        .top-card { background: var(--card); border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; width: 200px; }
        .top-card .rank { font-size: 2rem; font-weight: 700; color: var(--gold); }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 20px; }
        .book-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        .book-card img { width: 100%; height: 250px; object-fit: cover; }
        .book-info { padding: 15px; }
        .rating { color: var(--gold); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>الكتب الأكثر مبيعاً</h1>
    <div class="top-three">
        <div class="top-card"><div class="rank">#1</div><img src="https://via.placeholder.com/150" alt=""><h3>فن اللامبالاة</h3><p>85 درهم</p></div>
        <div class="top-card"><div class="rank">#2</div><img src="https://via.placeholder.com/150" alt=""><h3>أحببت وغداً</h3><p>80 درهم</p></div>
        <div class="top-card"><div class="rank">#3</div><img src="https://via.placeholder.com/150" alt=""><h3>الأنثى كما يجب</h3><p>70 درهم</p></div>
    </div>
    <div class="books-grid">
        <div class="book-card"><img src="https://via.placeholder.com/200x250" alt=""><div class="book-info"><h4>العادات السبع</h4><div class="rating">★★★★☆</div><p>60 درهم</p></div></div>
        <div class="book-card"><img src="https://via.placeholder.com/200x250" alt=""><div class="book-info"><h4>قوة الآن</h4><div class="rating">★★★★★</div><p>75 درهم</p></div></div>
    </div>
</body>
</html>
