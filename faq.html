<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأسئلة الشائعة - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f3f0; --text: #1e2a2e; --card: white; --border: #e0dcd5; --accent: #b8915c;
        }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #d4a373; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Tajawal', sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        a { color: var(--accent); text-decoration: none; }
        .back-link { margin-bottom: 30px; display: block; }
        h1 { color: var(--accent); }
        .faq-item { background: var(--card); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 15px; overflow: hidden; }
        .faq-question { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .faq-answer { padding: 0 20px 20px; display: none; }
        .faq-item.open .faq-answer { display: block; }
        .faq-item.open .fa-chevron-down { transform: rotate(180deg); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>الأسئلة الشائعة</h1>
    <div class="faq-list">
        <div class="faq-item open">
            <div class="faq-question" onclick="toggleFaq(this)"><span>كم تكلفة الشحن؟</span><i class="fas fa-chevron-down"></i></div>
            <div class="faq-answer">تختلف حسب المدينة، تبدأ من 25 درهم للدار البيضاء وتصل إلى 50 درهم للمدن البعيدة.</div>
        </div>
        <div class="faq-item">
            <div class="faq-question" onclick="toggleFaq(this)"><span>كم مدة التوصيل؟</span><i class="fas fa-chevron-down"></i></div>
            <div class="faq-answer">تتراوح بين 24 ساعة و 5 أيام حسب المدينة.</div>
        </div>
        <div class="faq-item">
            <div class="faq-question" onclick="toggleFaq(this)"><span>هل يمكن إرجاع الكتاب؟</span><i class="fas fa-chevron-down"></i></div>
            <div class="faq-answer">نعم، خلال 7 أيام من الاستلام بشرط أن يكون بحالته الأصلية.</div>
        </div>
    </div>
    <script>
        function toggleFaq(el) {
            const item = el.closest('.faq-item');
            item.classList.toggle('open');
        }
    </script>
</body>
</html>
