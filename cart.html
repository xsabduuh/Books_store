<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سلة التسوق - مكتبة النور</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  /* ========== LIGHT MODE (default) ========== */
  :root {
    --bg-body: #FAF7F2;
    --text-primary: #1C2B33;
    --text-secondary: #6B7F89;
    --border-light: #EDE5D8;
    --card-bg: #FFFFFF;
    --accent: #C9935A;
    --accent-dark: #A87040;
    --accent-light: #F5E8D6;
    --danger: #D94F4F;
    --success: #2D9E6B;
    --heart: #e84393;
    --shadow: rgba(0, 0, 0, 0.05);
    --icon-bg: rgba(201,147,90,0.12);
    --icon-hover: rgba(201,147,90,0.25);
    --toast-bg: #1C2B33;
    --toast-text: #FFFFFF;
    --overlay: rgba(28,43,51,0.55);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.35s, color 0.25s;
  }

  /* Top accent bar */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #8b3a1a, var(--accent), var(--heart), var(--accent), #8b3a1a);
    z-index: 100;
  }

  /* Soft bg glow (light mode) */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 15% 15%, rgba(232,67,147,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 85%, rgba(201,145,58,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* Header */
  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 32px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--accent-dark); transform: translateX(3px); }

  .logo {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1rem;
    box-shadow: 0 4px 12px rgba(201,147,90,0.35);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .logo:hover .logo-icon {
    transform: rotate(-5deg) scale(1.08);
    box-shadow: 0 6px 16px rgba(201,147,90,0.45);
  }

  .wishlist-link {
    color: var(--accent);
    font-size: 1.3rem;
    text-decoration: none;
    transition: all 0.2s;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--icon-bg);
  }
  .wishlist-link:hover {
    color: var(--accent-dark);
    background: var(--icon-hover);
    transform: scale(1.05);
  }

  /* Page Title */
  .page-title-block {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.5s ease both;
  }
  .page-title-block h1 {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .page-title-block .subtitle {
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
  .ornament {
    display: block;
    color: var(--accent);
    font-size: 1.4rem;
    letter-spacing: 6px;
    margin: 6px 0;
    opacity: 0.7;
  }

  /* Empty Cart */
  .empty-cart {
    text-align: center;
    padding: 64px 20px;
    animation: fadeUp 0.5s ease both;
  }
  .empty-icon {
    width: 100px; height: 100px;
    background: var(--accent-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 2.4rem;
    color: var(--accent);
    border: 2px dashed var(--border-light);
  }
  .empty-cart h2 {
    font-family: 'Amiri', serif;
    font-size: 1.4rem;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .empty-cart p {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 28px;
  }
  .btn-browse {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    text-decoration: none;
    transition: all 0.25s;
    box-shadow: 0 4px 16px rgba(201,145,58,0.3);
  }
  .btn-browse:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(201,145,58,0.4);
  }

  /* Cart Layout */
  .cart-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  /* Cart Card (items) */
  .cart-card {
    background: var(--card-bg);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 20px var(--shadow);
    animation: fadeUp 0.4s ease both;
  }
  .card-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, var(--accent-light), var(--accent-light));
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header-title {
    font-family: 'Amiri', serif;
    font-size: 1.15rem;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header-title i { color: var(--accent); }
  .items-count {
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* Cart Item Row */
  .cart-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background 0.2s;
    animation: slideIn 0.3s ease both;
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item:hover { background: var(--accent-light); }

  .book-thumb {
    width: 56px;
    height: 74px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    background: var(--accent-light);
  }
  .book-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .book-thumb .fallback-icon {
    font-size: 1.8rem;
    color: var(--accent-dark);
    opacity: 0.6;
  }

  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text-primary);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-author {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .item-price-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--accent-light);
    color: var(--accent-dark);
    font-weight: 700;
    font-size: 0.85rem;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid rgba(201,145,58,0.3);
  }

  .item-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--accent-light);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border-light);
  }
  .qty-btn {
    width: 30px; height: 30px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--accent);
    font-size: 0.9rem;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-btn:hover { background: var(--icon-bg); }
  .qty-num {
    min-width: 28px;
    text-align: center;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text-primary);
    background: transparent;
    border: none;
    outline: none;
  }
  .remove-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border-light);
    background: var(--accent-light);
    border-radius: 8px;
    cursor: pointer;
    color: var(--danger);
    font-size: 0.8rem;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .remove-btn:hover {
    background: var(--danger);
    color: #fff;
    border-color: var(--danger);
    transform: scale(0.96);
  }

  /* Summary Card */
  .summary-card {
    background: var(--card-bg);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 20px var(--shadow);
    animation: fadeUp 0.5s ease 0.1s both;
  }
  .summary-card .card-header {
    background: linear-gradient(135deg, var(--text-primary), #2d1f0f);
  }
  .summary-card .card-header-title { color: #fff; }
  .summary-card .card-header-title i { color: var(--accent); }
  .summary-body { padding: 20px; }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    font-size: 0.9rem;
    color: var(--text-secondary);
    border-bottom: 1px dashed var(--border-light);
  }
  .summary-row:last-of-type { border-bottom: none; }
  .summary-row span:last-child { font-weight: 600; color: var(--text-primary); }

  .summary-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 12px 0;
  }

  .summary-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0 4px;
  }
  .total-label {
    font-family: 'Amiri', serif;
    font-size: 1.1rem;
    color: var(--text-primary);
  }
  .total-amount {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent-dark);
  }
  .total-currency { font-size: 0.9rem; color: var(--text-secondary); margin-left: 4px; }

  /* Promo Section */
  .promo-section {
    margin-top: 16px;
    display: flex;
    gap: 8px;
  }
  .promo-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border-light);
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    background: var(--bg-body);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
    direction: ltr;
    text-align: center;
  }
  .promo-input:focus { border-color: var(--accent); }
  .promo-input::placeholder { color: var(--text-secondary); direction: rtl; }
  .promo-btn {
    padding: 10px 16px;
    background: var(--accent-light);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    color: var(--text-primary);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .promo-btn:hover {
    background: var(--icon-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Checkout Button */
  .checkout-btn {
    width: 100%;
    margin-top: 18px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 18px rgba(201,145,58,0.35);
    letter-spacing: 0.5px;
  }
  .checkout-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,145,58,0.45);
  }
  .checkout-btn:active { transform: translateY(0); }

  /* Secure Badge */
  .secure-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 12px;
    font-size: 0.75rem;
    color: var(--text-secondary);
  }
  .secure-badge i { color: var(--success); }

  /* Continue Shopping Link */
  .continue-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.2s;
  }
  .continue-link:hover { color: var(--accent-dark); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,9,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    padding: 16px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    border: 1px solid var(--border-light);
  }
  .modal-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #e8f8ee, #d4f0de);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 2rem;
    color: var(--success);
    border: 3px solid #b8e8c8;
  }
  .modal-box h2 {
    font-family: 'Amiri', serif;
    font-size: 1.4rem;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .modal-box p {
    color: var(--text-secondary);
    font-size: 0.88rem;
    margin-bottom: 24px;
  }
  .modal-close {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-close:hover { transform: translateY(-2px); }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .cart-item {
      flex-wrap: wrap;
    }
    .item-actions {
      width: 100%;
      justify-content: flex-end;
      margin-top: 8px;
    }
  }

  /* ========== DARK MODE (matches index.html) ========== */
  [data-theme="dark"] {
    --bg-body: #111820;
    --text-primary: #EDE5D8;
    --text-secondary: #9AABB5;
    --border-light: #263340;
    --card-bg: #192330;
    --accent: #D4A06A;
    --accent-dark: #C9935A;
    --accent-light: #2A2018;
    --danger: #E06B6B;
    --success: #5BBF92;
    --heart: #ff77aa;
    --shadow: rgba(0, 0, 0, 0.4);
    --icon-bg: rgba(212,160,106,0.15);
    --icon-hover: rgba(212,160,106,0.3);
    --toast-bg: #263340;
    --toast-text: #EDE5D8;
    --overlay: rgba(0,0,0,0.6);
  }

  [data-theme="dark"] body::before {
    background: radial-gradient(ellipse at 15% 15%, rgba(212,160,106,0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 85%, rgba(212,160,106,0.12) 0%, transparent 60%);
  }

  [data-theme="dark"] .logo-icon {
    background: linear-gradient(135deg, var(--accent), #b45a2a);
  }
  [data-theme="dark"] .wishlist-link {
    background: rgba(212,160,106,0.15);
  }
  [data-theme="dark"] .wishlist-link:hover {
    background: rgba(212,160,106,0.3);
  }
  [data-theme="dark"] .cart-item:hover {
    background: #2A2018;
  }
  [data-theme="dark"] .item-price-tag,
  [data-theme="dark"] .qty-control {
    background: #2A2018;
    border-color: #3f352b;
  }
  [data-theme="dark"] .remove-btn {
    background: #2A2018;
    border-color: #3f352b;
  }
  [data-theme="dark"] .remove-btn:hover {
    background: var(--danger);
    border-color: var(--danger);
  }
  [data-theme="dark"] .promo-input {
    background: #1C2B33;
  }
  [data-theme="dark"] .promo-btn {
    background: #2A2018;
  }
  [data-theme="dark"] .modal-box {
    background: #192330;
  }
  [data-theme="dark"] .book-thumb .fallback-icon {
    color: var(--accent);
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <header class="site-header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-right"></i> الرئيسية
    </a>
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-book-open"></i></div>
      مكتبة النور
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <!-- Dark mode toggle button -->
      <button id="darkModeToggle" style="background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--accent); transition: all 0.2s; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
        <i class="fas fa-moon"></i>
      </button>
      <a href="wishlist.html" class="wishlist-link" title="المفضلة">
        <i class="fas fa-heart"></i>
      </a>
    </div>
  </header>

  <div class="page-title-block">
    <h1>سلة التسوق</h1>
    <span class="ornament">— ✦ —</span>
    <p class="subtitle">راجع طلبك قبل إتمام الشراء</p>
  </div>

  <div id="cartContent"></div>

</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="checkoutModal">
  <div class="modal-box">
    <div class="modal-icon"><i class="fas fa-check"></i></div>
    <h2>تم استلام طلبك!</h2>
    <p>شكراً لك على الشراء من مكتبة النور.<br>سيتم التواصل معك قريباً لتأكيد الطلب.</p>
    <button class="modal-close" onclick="closeModal()">
      <i class="fas fa-home"></i> العودة للرئيسية
    </button>
  </div>
</div>

<script data-cfasync="false">
  // --- Dark Mode Handling ---
  const htmlEl = document.documentElement;
  const toggleBtn = document.getElementById('darkModeToggle');
  const icon = toggleBtn.querySelector('i');
  const savedTheme = localStorage.getItem('theme') || 'light';
  htmlEl.setAttribute('data-theme', savedTheme);
  function updateThemeIcon(theme) {
    icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  }
  updateThemeIcon(savedTheme);
  toggleBtn.addEventListener('click', () => {
    const cur = htmlEl.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    htmlEl.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon(next);
  });

  // --- Book Image Mapping (same as wishlist) ---
  const bookImages = {
    'فن اللامبالاة': 'IMG_2514.JPG',
    'متعة أن تكون في العشرين': 'IMG_2515.JPG',
    'الأنثى كما يجب أن تكون': 'IMG_2516.JPG',
    'أحببت وغداً': 'IMG_2517.JPG'
  };

  function getBookImageUrl(bookName) {
    return bookImages[bookName] || null;
  }

  function renderBookThumb(bookName) {
    const imgUrl = getBookImageUrl(bookName);
    if (imgUrl) {
      return `<img src="${imgUrl}" alt="${bookName}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'fallback-icon\\'><i class=\\'fas fa-book\\'></i></div>';">`;
    } else {
      return `<div class="fallback-icon"><i class="fas fa-book"></i></div>`;
    }
  }

  // --- Cart Data ---
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  // Ensure each item has qty and author
  cart = cart.map(item => ({
    name: item.name,
    author: item.author || '',
    price: item.price,
    qty: item.qty || 1
  }));

  const SHIPPING = 15;
  let DISCOUNT = 0;

  // Helper functions
  function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
  }

  function showToast(msg) {
    // Simple alert for promo messages (or could use a toast system)
    alert(msg);
  }

  function render() {
    const container = document.getElementById('cartContent');
    if (cart.length === 0) {
      container.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon"><i class="fas fa-shopping-basket"></i></div>
          <h2>سلتك فارغة</h2>
          <p>لم تضف أي كتب بعد.<br>استعرض مجموعتنا الرائعة واختر ما يناسبك!</p>
          <a href="index.html" class="btn-browse"><i class="fas fa-book"></i> تصفح الكتب</a>
        </div>`;
      return;
    }

    // Build items HTML
    let itemsHTML = '';
    cart.forEach((item, i) => {
      const delay = i * 0.06;
      const thumbHtml = renderBookThumb(item.name);
      itemsHTML += `
        <div class="cart-item" style="animation-delay:${delay}s">
          <div class="book-thumb">
            ${thumbHtml}
          </div>
          <div class="item-info">
            <div class="item-name">${escapeHtml(item.name)}</div>
            ${item.author ? `<div class="item-author">${escapeHtml(item.author)}</div>` : ''}
            <span class="item-price-tag"><i class="fas fa-tag" style="font-size:0.7rem"></i> ${item.price} درهم</span>
          </div>
          <div class="item-actions">
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(${i}, -1)"><i class="fas fa-minus"></i></button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${i}, 1)"><i class="fas fa-plus"></i></button>
            </div>
            <button class="remove-btn" onclick="removeItem(${i})"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>`;
    });

    // Calculations
    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    const total = subtotal + SHIPPING - DISCOUNT;
    const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);

    container.innerHTML = `
      <div class="cart-layout">
        <div class="cart-card">
          <div class="card-header">
            <span class="card-header-title"><i class="fas fa-shopping-cart"></i> الكتب المختارة</span>
            <span class="items-count">${totalItems} ${totalItems === 1 ? 'كتاب' : 'كتب'}</span>
          </div>
          ${itemsHTML}
        </div>
        <div class="summary-card">
          <div class="card-header">
            <span class="card-header-title"><i class="fas fa-receipt"></i> ملخص الطلب</span>
          </div>
          <div class="summary-body">
            <div class="summary-row"><span>المجموع الفرعي</span><span>${subtotal} درهم</span></div>
            <div class="summary-row"><span>رسوم الشحن</span><span>${SHIPPING} درهم</span></div>
            ${DISCOUNT > 0 ? `<div class="summary-row"><span>الخصم</span><span style="color:var(--success)">- ${DISCOUNT} درهم</span></div>` : ''}
            <div class="summary-divider"></div>
            <div class="summary-total">
              <span class="total-label">الإجمالي</span>
              <span class="total-amount"><span class="total-currency">MAD</span>${total}</span>
            </div>
            <div class="promo-section">
              <input type="text" class="promo-input" id="promoCode" placeholder="كود الخصم (اختياري)">
              <button class="promo-btn" onclick="applyPromo()"><i class="fas fa-tag"></i> تطبيق</button>
            </div>
            <button class="checkout-btn" onclick="checkout()">
              <i class="fas fa-lock"></i> إتمام الشراء بأمان
            </button>
            <div class="secure-badge"><i class="fas fa-shield-alt"></i> دفع آمن ومشفر</div>
          </div>
        </div>
      </div>
      <a href="index.html" class="continue-link"><i class="fas fa-plus"></i> إضافة المزيد من الكتب</a>
    `;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Actions
  window.changeQty = function(index, delta) {
    cart[index].qty += delta;
    if (cart[index].qty <= 0) {
      cart.splice(index, 1);
    }
    saveCart();
    render();
  };

  window.removeItem = function(index) {
    cart.splice(index, 1);
    saveCart();
    render();
  };

  window.applyPromo = function() {
    const code = (document.getElementById('promoCode').value || '').toUpperCase().trim();
    if (code === 'ALNOOR10') {
      DISCOUNT = 10;
      showToast('✅ تم تطبيق كود الخصم: خصم 10 درهم');
    } else if (code === 'WELCOME') {
      DISCOUNT = 5;
      showToast('✅ تم تطبيق كود الخصم: خصم 5 درهم');
    } else {
      showToast('❌ كود الخصم غير صحيح');
    }
    render();
  };

  window.checkout = function() {
    if (cart.length === 0) return;
    document.getElementById('checkoutModal').classList.add('active');
    cart = [];
    localStorage.removeItem('cart');
  };

  window.closeModal = function() {
    document.getElementById('checkoutModal').classList.remove('active');
    window.location.href = 'index.html';
  };

  // Initial render
  render();
</script>
</body>
</html>
