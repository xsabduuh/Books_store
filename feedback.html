<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشكاوى والاقتراحات - مكتبة النور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f3f0; --text: #1e2a2e; --card: white; --border: #e0dcd5; --accent: #b8915c;
        }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #d4a373; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Tajawal', sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        a { color: var(--accent); text-decoration: none; }
        .back-link { margin-bottom: 30px; display: block; }
        h1 { color: var(--accent); }
        form { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; max-width: 600px; margin: 0 auto; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
        button { background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; }
        .rating { display: flex; gap: 10px; margin-bottom: 20px; }
        .rating i { font-size: 1.5rem; color: #ccc; cursor: pointer; }
        .rating i.active { color: gold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <h1>الشكاوى والاقتراحات</h1>
    <form>
        <select><option>شكوى</option><option>اقتراح</option><option>استفسار</option></select>
        <input type="text" placeholder="الاسم">
        <input type="email" placeholder="البريد الإلكتروني">
        <textarea rows="5" placeholder="تفاصيل الرسالة"></textarea>
        <div class="rating">
            <i class="far fa-star" onclick="rate(this,1)"></i><i class="far fa-star" onclick="rate(this,2)"></i><i class="far fa-star" onclick="rate(this,3)"></i><i class="far fa-star" onclick="rate(this,4)"></i><i class="far fa-star" onclick="rate(this,5)"></i>
        </div>
        <button type="submit">إرسال</button>
    </form>
    <script>
        function rate(el, n) {
            const stars = el.parentElement.children;
            for (let i = 0; i < stars.length; i++) {
                stars[i].className = i < n ? 'fas fa-star active' : 'far fa-star';
            }
        }
    </script>
</body>
</html>
